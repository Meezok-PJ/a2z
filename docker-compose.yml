services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: a2z
      POSTGRES_PASSWORD: a2z_secret
      POSTGRES_DB: a2z_vault
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2z -d a2z_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://a2z:a2z_secret@db:5432/a2z_vault
      ADMIN_USERNAME: admin
      # AuthKey derived from plaintext master password "Admin123!ChangeMe"
      # using the browser flow (Argon2id + salt "a2z-ftl:admin").
      ADMIN_MASTER_PASSWORD_HASH: "Fsexj7FzzZ7VXaA3X5tbHLL4zqSqRzC3R6f3AnxjzOg="
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
