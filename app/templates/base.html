<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2Z Vault</title>
  <script nonce="{{ csp_nonce }}">
    (function () {
      try {
        var saved = localStorage.getItem("a2z_theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (error) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid.css') }}">
  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js" integrity="sha384-qEqAs1VsN9WH2myXDbiP2wGGIttL9bMRZBKCl54ZnzpDlVqbYANP9vMaoT/wvQcf" crossorigin="anonymous"></script>
  {% block head_extras %}{% endblock %}
  <script defer src="{{ url_for('static', filename='js/liquid.js') }}"></script>
  <script defer src="{{ url_for('static', filename='js/security.js') }}"></script>
  <script defer src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <div id="webGLApp" aria-hidden="true">
    <canvas id="liquid-bg"></canvas>
  </div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <main class="app-shell {% block shell_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script nonce="{{ csp_nonce }}">feather.replace()</script>
</body>
</html>
